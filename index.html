<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #070a10;
      --bg2:           #0c1120;
      --surface:       #101826;
      --border:        #1a2840;
      --text:          #8aa0bc;
      --text-bright:   #c8dcf0;

      /* Backend tracks */
      --c-base:        #00e676;
      --c-tooling:     #ffd740;
      --c-language:    #40c4ff;
      --c-stack:       #7c4dff;
      --c-api:         #ff6d00;
      --c-quality:     #e040fb;
      --c-data:        #00bcd4;
      --c-security:    #ff5252;
      --c-arch:        #69f0ae;
      --c-prod:        #ffab40;
      --c-go:          #00acc1;

      /* Pipecat tracks */
      --c-pc-base:     #f97316;
      --c-pc-core:     #fb923c;
      --c-pc-ai:       #a78bfa;
      --c-pc-infra:    #34d399;

      --locked-bg:     #0c1220;
      --locked-border: #1a2840;

      --tab-active-backend: #7c4dff;
      --tab-active-pipecat: #f97316;
    }

    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; }

    body::before {
      content:''; position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size:180px; pointer-events:none; z-index:900; opacity:.7;
    }

    /* ── HEADER ── */
    #header {
      position:fixed; top:0; left:0; right:0; z-index:200;
      height:60px; display:flex; align-items:center; justify-content:space-between;
      padding:0 28px;
      background:linear-gradient(180deg,rgba(7,10,16,.98) 60%,rgba(7,10,16,0));
      border-bottom:1px solid rgba(26,40,64,.6);
    }

    #header-left { display:flex; align-items:center; gap:20px; }

    #header-title {
      font-family:'Cinzel',serif; font-size:12px; font-weight:600;
      letter-spacing:.35em; text-transform:uppercase; color:#c9a84c;
      text-shadow:0 0 20px rgba(201,168,76,.4);
    }

    #tdd-badge {
      font-size:10px; letter-spacing:.15em; text-transform:uppercase;
      padding:3px 10px; border:1px solid rgba(228,64,251,.3);
      color:#e040fb; border-radius:1px; opacity:.7;
      transition: opacity .3s, border-color .3s, color .3s;
    }
    body.pipecat-mode #tdd-badge {
      border-color: rgba(249,115,22,.3);
      color: #f97316;
    }

    #stats { display:flex; gap:28px; align-items:center; }
    .stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .stat-val { font-family:'Cinzel',serif; font-size:16px; font-weight:900; color:var(--text-bright); }
    .stat-label { font-size:9px; letter-spacing:.2em; text-transform:uppercase; opacity:.5; }

    #progress-wrap { display:flex; flex-direction:column; gap:4px; width:180px; }
    #progress-bg { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    #progress-fill { height:100%; background:linear-gradient(90deg,#7c4dff,#00e676); border-radius:2px; transition:width .6s cubic-bezier(.4,0,.2,1); }
    body.pipecat-mode #progress-fill { background:linear-gradient(90deg,#a78bfa,#f97316); }
    #progress-pct { font-size:10px; letter-spacing:.12em; text-transform:uppercase; opacity:.4; text-align:right; }

    /* ── TABS ── */
    #tabs {
      position:fixed; top:60px; left:0; right:0; z-index:190;
      display:flex; align-items:stretch; height:40px;
      background:rgba(7,10,16,.95);
      border-bottom:1px solid rgba(26,40,64,.8);
    }

    .tab {
      display:flex; align-items:center; gap:8px;
      padding:0 24px; cursor:pointer;
      font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
      color:var(--text); opacity:.45;
      border-bottom:2px solid transparent;
      transition: opacity .2s, border-color .2s, color .2s;
      user-select:none;
    }
    .tab:hover { opacity:.7; }
    .tab.active { opacity:1; }
    .tab[data-tab="backend"].active {
      color:#7c4dff;
      border-bottom-color:#7c4dff;
    }
    .tab[data-tab="pipecat"].active {
      color:#f97316;
      border-bottom-color:#f97316;
    }

    .tab-pip {
      width:6px; height:6px; border-radius:50%;
      flex-shrink:0;
    }
    .tab[data-tab="backend"] .tab-pip { background:#7c4dff; }
    .tab[data-tab="pipecat"] .tab-pip { background:#f97316; }

    .tab-divider {
      width:1px; background:var(--border); margin:10px 0;
    }

    /* ── CANVAS ── */
    #canvas-wrap { position:fixed; inset:0; top:100px; overflow:hidden; cursor:grab; }
    #canvas-wrap.grabbing { cursor:grabbing; }
    #canvas { position:absolute; transform-origin:0 0; }
    svg#connections { position:absolute; top:0; left:0; pointer-events:none; }

    /* ── NODES ── */
    .node {
      position:absolute; transform:translate(-50%,-50%);
      cursor:pointer; user-select:none;
      transition:transform .2s ease, filter .2s ease;
    }
    .node:hover { transform:translate(-50%,-50%) scale(1.1); }
    .node.locked { filter:saturate(0.2) brightness(0.7); }
    .node.locked:hover { filter:saturate(0.3) brightness(0.85); }

    .node-outer {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      position:relative;
    }

    .node-outer::before {
      content:''; position:absolute; inset:-5px; border-radius:50%;
      border:1px solid transparent; transition:all .4s;
    }
    .node-outer::after {
      content:''; position:absolute; inset:-10px; border-radius:50%;
      border:1px dashed transparent; transition:all .4s;
    }

    .node.available .node-outer::before  { animation:spin 6s linear infinite; }
    .node.available .node-outer::after   { animation:spin 10s linear infinite reverse; }
    .node.in_progress .node-outer::before { animation:spin 3s linear infinite; }
    .node.in_progress .node-outer::after  { animation:spin 5s linear infinite reverse; }
    .node.completed .node-outer::after   { animation:spin 20s linear infinite; }

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .node-inner {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:28px; border:2px solid; position:relative; transition:all .3s;
    }

    .node-label {
      position:absolute; bottom:-30px; left:50%; transform:translateX(-50%);
      white-space:nowrap; font-size:12px; font-weight:700;
      letter-spacing:.06em; text-transform:uppercase; text-align:center;
      transition:color .3s;
    }
    .node.locked .node-label { color:var(--locked-border); }

    /* ── PANEL ── */
    #panel {
      position:fixed; right:28px; top:50%; transform:translateY(-50%);
      width:320px; background:var(--bg2);
      border:1px solid var(--border); border-radius:2px;
      padding:0; z-index:300; display:none;
      box-shadow:-12px 0 60px rgba(0,0,0,.7);
      overflow:hidden;
    }
    #panel.visible { display:flex; flex-direction:column; }

    #panel-top-bar { height:3px; background:var(--panel-color,#7c4dff); }

    #panel-body { padding:24px; display:flex; flex-direction:column; gap:16px; overflow-y:auto; max-height:80vh; }

    #panel-track-label {
      font-size:9px; letter-spacing:.3em; text-transform:uppercase;
      color:var(--panel-color,#7c4dff); opacity:.8;
    }

    #panel-icon { font-size:36px; line-height:1; }

    #panel-title {
      font-family:'Cinzel',serif; font-size:16px; font-weight:600;
      color:var(--text-bright); line-height:1.3;
    }

    #panel-status-badge {
      display:inline-block; font-size:9px; letter-spacing:.2em;
      text-transform:uppercase; padding:3px 8px;
      border:1px solid var(--panel-color,#7c4dff);
      color:var(--panel-color,#7c4dff); border-radius:1px;
    }

    #panel-desc { font-size:13px; line-height:1.75; color:var(--text); }

    .panel-section-title {
      font-size:9px; letter-spacing:.25em; text-transform:uppercase;
      color:var(--text); opacity:.4; margin-bottom:8px;
    }

    #panel-requires { display:flex; flex-direction:column; gap:6px; }
    .req-item { display:flex; align-items:center; gap:8px; font-size:11px; letter-spacing:.05em; }
    .req-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; border:1px solid; }
    .req-dot.done    { background:#00e676; border-color:#00e676; }
    .req-dot.pending { background:transparent; border-color:var(--locked-border); }
    .req-item.done-item { color:#00e676; }
    .req-item.pending-item { color:var(--locked-border); }

    #panel-deliverables { display:flex; flex-direction:column; gap:8px; }
    .del-item { display:flex; gap:10px; font-size:12px; line-height:1.5; align-items:flex-start; }
    .del-num { font-family:'Cinzel',serif; font-size:10px; font-weight:600; color:var(--panel-color,#7c4dff); flex-shrink:0; margin-top:1px; }

    #panel-assessment { display:flex; flex-direction:column; gap:8px; }
    .assessment-item { display:flex; gap:10px; font-size:11px; line-height:1.5; align-items:flex-start; opacity:.8; }
    .assessment-mark { color:#00e676; flex-shrink:0; }

    #panel-btn {
      width:100%; padding:12px; border:1px solid var(--panel-color,#7c4dff);
      background:transparent; color:var(--panel-color,#7c4dff);
      font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:.2em; text-transform:uppercase; cursor:pointer;
      border-radius:1px; transition:all .2s; margin-top:4px;
    }
    #panel-btn:hover:not(:disabled) { background:var(--panel-color,#7c4dff); color:var(--bg); }
    #panel-btn:disabled { opacity:.25; cursor:not-allowed; }

    #panel-close {
      position:absolute; top:14px; right:14px;
      background:none; border:none; color:var(--text); opacity:.35;
      cursor:pointer; font-size:16px; line-height:1; transition:opacity .2s; z-index:10;
    }
    #panel-close:hover { opacity:1; }

    /* ── LEGEND ── */
    #legend {
      position:fixed; left:24px; bottom:28px; z-index:200;
      display:flex; flex-direction:column; gap:6px;
    }
    .leg { display:flex; align-items:center; gap:8px; font-size:10px; letter-spacing:.1em; text-transform:uppercase; opacity:.5; }
    .leg-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid; flex-shrink:0; }
    .leg-dot.locked     { border-color:#1a2840; background:#0c1220; }
    .leg-dot.available  { border-color:#7c4dff; background:#0a1a30; }
    .leg-dot.in_progress{ border-color:#40c4ff; background:#081828; }
    .leg-dot.completed  { border-color:#00e676; background:#081a10; }

    /* ── CONTROLS ── */
    #controls {
      position:fixed; left:24px; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:6px; z-index:200;
    }
    .ctrl {
      width:32px; height:32px; background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-size:14px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      border-radius:2px; transition:all .2s;
    }
    .ctrl:hover { border-color:#7c4dff; color:#7c4dff; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(60px);
      background:var(--surface); border:1px solid var(--c-base);
      color:var(--c-base); padding:10px 20px; font-size:12px;
      letter-spacing:.1em; border-radius:2px; z-index:400;
      transition:transform .4s cubic-bezier(.4,0,.2,1); white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header id="header">
  <div id="header-left">
    <div id="header-title">⟨ Skill Tree ⟩</div>
    <div id="tdd-badge">TDD Mode</div>
  </div>
  <div id="stats">
    <div class="stat"><span class="stat-val" id="stat-done">0</span><span class="stat-label">Hechos</span></div>
    <div class="stat"><span class="stat-val" id="stat-avail">0</span><span class="stat-label">Disponibles</span></div>
    <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Total</span></div>
    <div id="progress-wrap">
      <div id="progress-bg"><div id="progress-fill" style="width:0%"></div></div>
      <div id="progress-pct">0% completado</div>
    </div>
  </div>
</header>

<div id="tabs">
  <div class="tab active" data-tab="backend">
    <span class="tab-pip"></span>
    Backend
  </div>
  <div class="tab-divider"></div>
  <div class="tab" data-tab="pipecat">
    <span class="tab-pip"></span>
    Pipecat
  </div>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="connections"></svg>
  </div>
</div>

<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-top-bar"></div>
  <div id="panel-body">
    <div id="panel-track-label">track</div>
    <span id="panel-icon">⚡</span>
    <div id="panel-title">Skill</div>
    <div id="panel-status-badge">Bloqueado</div>
    <div id="panel-desc">–</div>

    <div id="panel-requires-wrap">
      <div class="panel-section-title">Requisitos</div>
      <div id="panel-requires"></div>
    </div>

    <div id="panel-deliverables-wrap">
      <div class="panel-section-title">Entregables</div>
      <div id="panel-deliverables"></div>
    </div>

    <div id="panel-assessment-wrap" style="display:none">
      <div class="panel-section-title">Criterios de aprobación final</div>
      <div id="panel-assessment"></div>
    </div>

    <button id="panel-btn">–</button>
  </div>
</div>

<div id="controls">
  <button class="ctrl" id="zoom-in">+</button>
  <button class="ctrl" id="zoom-out">−</button>
  <button class="ctrl" id="zoom-fit">⊡</button>
</div>

<div id="legend">
  <div class="leg"><span class="leg-dot locked"></span>Bloqueado</div>
  <div class="leg"><span class="leg-dot available"></span>Disponible</div>
  <div class="leg"><span class="leg-dot in_progress"></span>En Progreso</div>
  <div class="leg"><span class="leg-dot completed"></span>Completado</div>
</div>

<div id="toast"></div>

<script>
// ── TRACK CONFIG ──
const TRACK_COLOR = {
  // Backend
  base:              '#00e676',
  tooling:           '#ffd740',
  'language-runtime':'#40c4ff',
  stack:             '#7c4dff',
  api:               '#ff6d00',
  quality:           '#e040fb',
  data:              '#00bcd4',
  security:          '#ff5252',
  architecture:      '#69f0ae',
  production:        '#ffab40',
  'go-contrast':     '#00acc1',
  // Pipecat
  'pc-base':         '#f97316',
  'pc-core':         '#fb923c',
  'pc-ai':           '#a78bfa',
  'pc-infra':        '#34d399',
};

const TRACK_NAME = {
  // Backend
  base:              'Base',
  tooling:           'Tooling',
  'language-runtime':'Language / Runtime',
  stack:             'Stack Principal',
  api:               'API',
  quality:           'Quality / Testing',
  data:              'Data',
  security:          'Security',
  architecture:      'Architecture',
  production:        'Production',
  'go-contrast':     'Go Contrast',
  // Pipecat
  'pc-base':         'Foundation',
  'pc-core':         'Core Pipeline',
  'pc-ai':           'AI / Models',
  'pc-infra':        'Infrastructure',
};

const ICONS = {
  // Backend
  start:               '🌱',
  'git-debug':         '🔧',
  'lang-fundamentals': '⚙️',
  'tdd-onboarding':    '🔴',
  'typescript-node-nest':'💜',
  'go-fundamentals':   '🐹',
  'tdd-foundations':   '🧪',
  'http-protocols':    '🌐',
  'error-handling':    '🛡️',
  'db-basic':          '🗄️',
  'api-design':        '📐',
  'async-concurrency': '⚡',
  'testing-real':      '🧪',
  'db-advanced':       '📊',
  'authn-authz':       '🔐',
  'backend-security':  '🔒',
  'background-jobs':   '⚙️',
  architecture:        '🏛️',
  'devops-basic':      '🐳',
  observability:       '📡',
  performance:         '🚀',
  semisenior:          '⭐',
  // Pipecat
  'pc-start':              '🎙️',
  'pc-frames':             '🔲',
  'pc-transport':          '📡',
  'pc-stt':                '👂',
  'pc-llm':                '🧠',
  'pc-webrtc':             '🌐',
  'pc-llm-pipeline':       '⚡',
  'pc-tts':                '🔊',
  'pc-function-calling':   '🔧',
  'pc-interruptions':      '🛑',
  'pc-vad-tuning':         '🎚️',
  'pc-multi-participant':  '👥',
  'pc-state-management':   '💾',
  'pc-observability':      '📊',
  'pc-production':         '🚀',
  'pc-expert':             '⭐',
};

const STATUS_LABEL = {
  locked:      'Bloqueado',
  available:   'Disponible',
  in_progress: 'En Progreso',
  completed:   'Completado',
};

const BTN_LABEL = {
  locked:      'Completá los requisitos primero',
  available:   'Empezar este skill',
  in_progress: 'Marcar como completado',
  completed:   'Ya completado ✓',
};

// ── LAYOUT ──
const CW = 1800, CH = 1800;
const MARGIN_X = 160, MARGIN_Y = 120;
const TIER_Y = tier => CH - MARGIN_Y - tier * 260;

const NODE_X_BACKEND = {
  start:                 0.50,
  'git-debug':           0.30,
  'lang-fundamentals':   0.70,
  'tdd-onboarding':      0.50,
  'typescript-node-nest':0.30,
  'go-fundamentals':     0.70,
  'tdd-foundations':     0.16,
  'http-protocols':      0.50,
  'error-handling':      0.22,
  'db-basic':            0.40,
  'api-design':          0.60,
  'async-concurrency':   0.78,
  'testing-real':        0.12,
  'db-advanced':         0.32,
  'authn-authz':         0.50,
  'backend-security':    0.68,
  'background-jobs':     0.82,
  architecture:          0.25,
  'devops-basic':        0.45,
  observability:         0.65,
  performance:           0.50,
  semisenior:            0.50,
};

const NODE_X_PIPECAT = {
  'pc-start':             0.50,
  'pc-frames':            0.30,
  'pc-transport':         0.70,
  'pc-stt':               0.28,
  'pc-llm':               0.72,
  'pc-webrtc':            0.85,
  'pc-llm-pipeline':      0.35,
  'pc-tts':               0.35,
  'pc-function-calling':  0.72,
  'pc-interruptions':     0.22,
  'pc-vad-tuning':        0.42,
  'pc-multi-participant': 0.65,
  'pc-state-management':  0.50,
  'pc-observability':     0.50,
  'pc-production':        0.50,
  'pc-expert':            0.50,
};

const NODE_SIZE = id => (id === 'start' || id === 'semisenior' || id === 'pc-start' || id === 'pc-expert') ? 100 : 78;

// ── STATE ──
let currentTab = 'backend';
let roadmaps = { backend: null, pipecat: null };
let nodeMaps = { backend: {}, pipecat: {} };
let selectedId = null;
let scale = 1, offsetX = 0, offsetY = 0;
let dragging = false, dragStart = { x:0, y:0 };

const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
const svg    = document.getElementById('connections');

// ── STATUS ──
function computeStatus(node, nMap) {
  if (node._completed) return 'completed';
  if (node._in_progress) {
    const allReqsDone = (node.requires||[]).every(r => nMap[r]?._completed);
    return allReqsDone ? 'in_progress' : 'locked';
  }
  if ((node.requires||[]).every(r => nMap[r]?._completed)) return 'available';
  return 'locked';
}

function recomputeAllStatuses(tab) {
  const rm = roadmaps[tab];
  const nm = nodeMaps[tab];
  let changed = true, passes = 0;
  while (changed && passes < 20) {
    changed = false;
    rm.nodes.forEach(n => {
      const prev = n.status;
      n.status = computeStatus(n, nm);
      if (n.status !== prev) changed = true;
    });
    passes++;
  }
}

// ── LOAD ──
async function loadAll() {
  const [backendRes, pipecatRes] = await Promise.all([
    fetch('./data/roadmap.json'),
    fetch('./data/pipecat-roadmap.json'),
  ]);
  roadmaps.backend  = await backendRes.json();
  roadmaps.pipecat  = await pipecatRes.json();

  ['backend', 'pipecat'].forEach(tab => {
    const rm = roadmaps[tab];
    const nm = {};
    const nodeX = tab === 'backend' ? NODE_X_BACKEND : NODE_X_PIPECAT;
    rm.nodes.forEach(n => {
      n._completed   = false;
      n._in_progress = false;
      nm[n.id] = n;
      const xFrac = nodeX[n.id] ?? 0.5;
      n._x = MARGIN_X + xFrac * (CW - MARGIN_X * 2);
      n._y = TIER_Y(n.tier);
    });
    nodeMaps[tab] = nm;
    loadProgress(tab);
    recomputeAllStatuses(tab);
  });

  render();
  fitView();
}

function loadProgress(tab) {
  const saved = localStorage.getItem(`roadmap-progress-${tab}`);
  if (!saved) return;
  const p = JSON.parse(saved);
  roadmaps[tab].nodes.forEach(n => {
    if (p[n.id]) {
      n._completed   = p[n.id].completed   || false;
      n._in_progress = p[n.id].in_progress || false;
    }
  });
}

function saveProgress() {
  const p = {};
  roadmaps[currentTab].nodes.forEach(n => {
    p[n.id] = { completed: n._completed, in_progress: n._in_progress };
  });
  localStorage.setItem(`roadmap-progress-${currentTab}`, JSON.stringify(p));
}

// ── RENDER ──
function render() {
  renderConnections();
  renderNodes();
  updateStats();
}

function renderConnections() {
  svg.innerHTML = '';
  svg.setAttribute('width', CW);
  svg.setAttribute('height', CH);

  const rm = roadmaps[currentTab];
  const nm = nodeMaps[currentTab];

  rm.nodes.forEach(target => {
    (target.requires || []).forEach(srcId => {
      const src = nm[srcId];
      if (!src) return;

      const done  = src._completed;
      const avail = src.status === 'available' || src.status === 'in_progress';
      const trackColor = TRACK_COLOR[target.track] || '#ffffff';

      let stroke, dash, width;
      if (done)        { stroke = trackColor; dash = 'none'; width = 1.5; }
      else if (avail)  { stroke = trackColor; dash = '3 8';  width = 1; }
      else             { stroke = 'rgba(26,40,64,0.6)'; dash = '2 10'; width = 1; }

      const x1 = src._x, y1 = src._y;
      const x2 = target._x, y2 = target._y;
      const cy = (y1 + y2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`);
      path.setAttribute('stroke', stroke);
      path.setAttribute('stroke-width', width);
      path.setAttribute('fill', 'none');
      if (dash !== 'none') path.setAttribute('stroke-dasharray', dash);
      path.setAttribute('opacity', done ? '0.5' : '0.35');
      svg.appendChild(path);
    });
  });
}

function renderNodes() {
  document.querySelectorAll('.node').forEach(e => e.remove());

  const rm = roadmaps[currentTab];

  rm.nodes.forEach(n => {
    const color = TRACK_COLOR[n.track] || '#ffffff';
    const size  = NODE_SIZE(n.id);

    const el = document.createElement('div');
    el.className = `node ${n.status}`;
    el.dataset.id = n.id;
    el.style.left = n._x + 'px';
    el.style.top  = n._y + 'px';

    let borderColor, bgColor, boxShadow, ringColor, ring2Color;
    switch (n.status) {
      case 'locked':
        borderColor = 'rgba(26,40,64,0.8)'; bgColor = 'rgba(12,18,32,0.9)';
        boxShadow = 'none'; ringColor = 'transparent'; ring2Color = 'transparent'; break;
      case 'available':
        borderColor = color; bgColor = `rgba(${hexToRgb(color)},.08)`;
        boxShadow = `0 0 18px ${color}55, inset 0 0 14px ${color}18`;
        ringColor = color+'88'; ring2Color = color+'33'; break;
      case 'in_progress':
        borderColor = color; bgColor = `rgba(${hexToRgb(color)},.14)`;
        boxShadow = `0 0 30px ${color}88, inset 0 0 20px ${color}28`;
        ringColor = color+'cc'; ring2Color = color+'55'; break;
      case 'completed':
        borderColor = color; bgColor = `rgba(${hexToRgb(color)},.1)`;
        boxShadow = `0 0 22px ${color}66, inset 0 0 16px ${color}22`;
        ringColor = color+'55'; ring2Color = color+'22'; break;
    }

    el.innerHTML = `
      <style>
        .node[data-id="${n.id}"] .node-outer::before { border-color:${ringColor}; }
        .node[data-id="${n.id}"] .node-outer::after  { border-color:${ring2Color}; }
      </style>
      <div class="node-outer" style="width:${size}px;height:${size}px;">
        <div class="node-inner" style="
          width:${size-14}px; height:${size-14}px;
          background:${bgColor}; border-color:${borderColor};
          box-shadow:${boxShadow};
        ">${ICONS[n.id] || '◆'}</div>
      </div>
      <div class="node-label" style="color:${n.status==='locked'?'#1a2840':color}aa">
        ${n.label}
      </div>
    `;

    el.addEventListener('click', () => selectNode(n.id));
    canvas.appendChild(el);
  });
}

function updateStats() {
  const rm = roadmaps[currentTab];
  const total  = rm.nodes.length;
  const done   = rm.nodes.filter(n => n._completed).length;
  const avail  = rm.nodes.filter(n => n.status === 'available').length;
  const pct    = Math.round(done / total * 100);
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-avail').textContent = avail;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '% completado';
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    if (t === currentTab) return;

    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');

    currentTab = t;
    selectedId = null;
    document.getElementById('panel').classList.remove('visible');

    document.body.classList.toggle('pipecat-mode', t === 'pipecat');

    const badge = document.getElementById('tdd-badge');
    if (t === 'pipecat') {
      badge.textContent = 'Build Mode';
    } else {
      badge.textContent = 'TDD Mode';
    }

    render();
    fitView();
  });
});

// ── SELECT NODE ──
function selectNode(id) {
  selectedId = id;
  const nm = nodeMaps[currentTab];
  const n = nm[id];
  if (!n) return;

  const color = TRACK_COLOR[n.track] || '#7c4dff';
  document.getElementById('panel').style.setProperty('--panel-color', color);
  document.getElementById('panel-top-bar').style.background = color;
  document.getElementById('panel-track-label').textContent = TRACK_NAME[n.track] || n.track;
  document.getElementById('panel-icon').textContent  = ICONS[id] || '◆';
  document.getElementById('panel-title').textContent = n.label;
  document.getElementById('panel-status-badge').textContent = STATUS_LABEL[n.status];
  document.getElementById('panel-desc').textContent  = n.description;

  const reqWrap = document.getElementById('panel-requires-wrap');
  const reqList = document.getElementById('panel-requires');
  if (n.requires && n.requires.length > 0) {
    reqList.innerHTML = n.requires.map(r => {
      const rn = nm[r];
      const done = rn?._completed;
      return `<div class="req-item ${done?'done-item':'pending-item'}">
        <span class="req-dot ${done?'done':'pending'}"></span>
        <span>${rn?.label || r}</span>
      </div>`;
    }).join('');
    reqWrap.style.display = 'block';
  } else {
    reqWrap.style.display = 'none';
  }

  const delWrap = document.getElementById('panel-deliverables-wrap');
  const delList = document.getElementById('panel-deliverables');
  if (n.deliverables && n.deliverables.length > 0) {
    delList.innerHTML = n.deliverables.map((d,i) =>
      `<div class="del-item">
        <span class="del-num">${String(i+1).padStart(2,'0')}</span>
        <span>${d}</span>
      </div>`
    ).join('');
    delWrap.style.display = 'block';
  } else {
    delWrap.style.display = 'none';
  }

  const assWrap = document.getElementById('panel-assessment-wrap');
  const assList = document.getElementById('panel-assessment');
  if (n.assessment && n.assessment.length > 0) {
    assList.innerHTML = n.assessment.map(a =>
      `<div class="assessment-item">
        <span class="assessment-mark">◆</span>
        <span>${a}</span>
      </div>`
    ).join('');
    assWrap.style.display = 'block';
  } else {
    assWrap.style.display = 'none';
  }

  const btn = document.getElementById('panel-btn');
  btn.textContent = BTN_LABEL[n.status];
  btn.disabled = n.status === 'locked' || n.status === 'completed';

  document.getElementById('panel').classList.add('visible');
}

// ── PANEL ACTIONS ──
document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('visible');
  selectedId = null;
});

document.getElementById('panel-btn').addEventListener('click', () => {
  if (!selectedId) return;
  const nm = nodeMaps[currentTab];
  const n = nm[selectedId];
  if (!n) return;

  if (n.status === 'available') {
    n._in_progress = true;
    showToast('Skill iniciado 🔥');
  } else if (n.status === 'in_progress') {
    n._in_progress = false;
    n._completed   = true;
    showToast('¡Completado! Nuevos skills desbloqueados.');
  }

  saveProgress();
  recomputeAllStatuses(currentTab);
  render();
  selectNode(selectedId);
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── PAN & ZOOM ──
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node') || e.target.closest('#panel')) return;
  dragging = true; wrap.classList.add('grabbing');
  dragStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  offsetX = e.clientX - dragStart.x;
  offsetY = e.clientY - dragStart.y;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = (mx - offsetX) / scale, wy = (my - offsetY) / scale;
  scale = Math.min(2.5, Math.max(0.25, scale * delta));
  offsetX = mx - wx * scale; offsetY = my - wy * scale;
  applyTransform();
}, { passive: false });

function applyTransform() {
  canvas.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}

function fitView() {
  const rect = wrap.getBoundingClientRect();
  scale = Math.min(rect.width / CW, rect.height / CH) * 0.92;
  offsetX = (rect.width  - CW * scale) / 2;
  offsetY = (rect.height - CH * scale) / 2;
  applyTransform();
}

document.getElementById('zoom-in').addEventListener('click',  () => { scale = Math.min(2.5, scale*1.2); applyTransform(); });
document.getElementById('zoom-out').addEventListener('click', () => { scale = Math.max(0.25, scale/1.2); applyTransform(); });
document.getElementById('zoom-fit').addEventListener('click', fitView);

// ── UTIL ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── INIT ──
loadAll();
</script>
